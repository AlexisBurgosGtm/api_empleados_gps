<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Empleados</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div id="app">
    <!-- Login -->
    <section id="view-login" class="view active">
      <div class="login-shell">
        <div class="login-card shadow-lg">
          <div class="login-brand">
            <div class="brand-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10m0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6"/>
              </svg>
            </div>
            <h1 class="login-title">GPS Empleados</h1>
            <p class="login-subtitle">Seguimiento en tiempo real</p>
          </div>

          <form id="login-form" class="login-form" novalidate>
            <div class="mb-3">
              <label for="empnit" class="form-label">Usuario (EMPNIT)</label>
              <input
                type="text"
                class="form-control form-control-lg"
                id="empnit"
                name="empnit"
                autocomplete="username"
                placeholder="Ingrese su EMPNIT"
                required
              />
            </div>
            <div class="mb-4">
              <label for="clave" class="form-label">Contraseña</label>
              <input
                type="password"
                class="form-control form-control-lg"
                id="clave"
                name="clave"
                autocomplete="current-password"
                placeholder="Ingrese su clave"
                required
              />
            </div>
            <button type="submit" class="btn btn-dark btn-lg w-100 login-btn" id="login-btn">
              Iniciar sesión
            </button>
          </form>
        </div>
      </div>
    </section>

    <!-- Dashboard -->
    <section id="view-dashboard" class="view">
      <header class="dashboard-header">
        <div class="header-left">
          <span class="header-badge">Empresa</span>
          <h2 id="empresa-nombre" class="header-title">—</h2>
        </div>
        <div class="header-actions">
          <span id="empleados-count" class="header-meta">0 empleados</span>
          <button type="button" class="btn btn-outline-light btn-sm" id="refresh-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" class="me-1">
              <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"/>
              <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466"/>
            </svg>
            Refrescar
          </button>
          <button type="button" class="btn btn-light btn-sm" id="logout-btn">Salir</button>
        </div>
      </header>
      <main class="dashboard-main">
        <div id="map"></div>
        <div id="map-loading" class="map-loading d-none">
          <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
        </div>
      </main>
    </section>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="/js/app.js"></script>
</body>
</html>
